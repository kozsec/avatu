<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>AVATU PROJECT</title>

<link rel="stylesheet" href="./css/style.css" />
<link rel="stylesheet" href="./css/season.css" />
</head>

<body>


  <!-- scanline -->
  <div class="scanlines"></div>

  <!-- 固定メニュー -->
  <div id="header"></div>
  

  <!-- ページ -->
  <main class="page">


    <section class="content">

      <h2>
        SEASONS
      </h2>

      <p>
        シーズンごとにゲーム環境が変わっていきます。1シーズンはおおよそ1年サイクルで回ります。
      </p>

    </section>

    <section class="content">

      <h2>
        SEASON #01 | SMILES
      </h2>
      <p>
        動画サイト「AVATUBE」で活躍するAIエージェント「MOVI」の笑顔を守ろう。
      </p>

      <p>
          <div class="season-bar">

    <!-- 企画 -->
    <div class="season-step done">
      <div class="arrow">01</div>
      <div class="season-label">企画</div>
    </div>

    <!-- 開発中 -->
    <div class="season-step active">
      <div class="arrow">02</div>
      <div class="season-label">開発中<br>[now]</div>
    </div>

    <!-- α -->
    <div class="season-step">
      <div class="arrow">03</div>
      <div class="season-label">アルファテスト</div>
    </div>

    <!-- β -->
    <div class="season-step">
      <div class="arrow">04</div>
      <div class="season-label">ベータテスト</div>
    </div>

    <!-- 開催 -->
    <div class="season-step">
      <div class="arrow">05</div>
      <div class="season-label">開催中</div>
    </div>

    <!-- 終了 -->
    <div class="season-step">
      <div class="arrow">06</div>
      <div class="season-label">終了</div>
    </div>
      </p>

    </section>




  </main>

  <div id="footer"></div>

  <script src="./js/main.js"></script>

</body>
</html>
